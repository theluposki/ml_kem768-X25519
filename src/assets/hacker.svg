<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @keyframes fall {
        0% { opacity: 0; transform: translateY(-20px); }
        10% { opacity: 1; }
        90% { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(600px); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      @keyframes glitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-3px, 1px); }
        40% { transform: translate(3px, -1px); }
        60% { transform: translate(-2px, 2px); }
        80% { transform: translate(2px, -2px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0.3; }
      }
      .char { font-family: 'Courier New', monospace; fill: #00ff41; font-size: 14px; }
      .char-dim { fill: #003b0d; }
      .char-bright { fill: #7fff00; filter: url(#glow); }
      .title { font-family: 'Courier New', monospace; fill: #00ff41; font-size: 42px; font-weight: bold; letter-spacing: 8px; filter: url(#glow); animation: glitch 4s infinite; }
      .subtitle { font-family: 'Courier New', monospace; fill: #00aa2a; font-size: 14px; letter-spacing: 4px; }
      .prompt { font-family: 'Courier New', monospace; fill: #00ff41; font-size: 13px; }
      .cursor { fill: #00ff41; animation: blink 1s infinite; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="crt">
      <feColorMatrix type="saturate" values="1.5"/>
    </filter>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#000" stop-opacity="0"/>
      <stop offset="80%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#000d00"/>

  <!-- Matrix rain characters -->
